<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#7c3aed"/>
  <!-- dot grid -->
  <circle cx="50" cy="50" r="4" fill="white" opacity="0.25"/>
  <circle cx="100" cy="50" r="4" fill="white" opacity="0.25"/>
  <circle cx="150" cy="50" r="4" fill="white" opacity="0.25"/>
  <circle cx="50" cy="100" r="4" fill="white" opacity="0.25"/>
  <circle cx="150" cy="100" r="4" fill="white" opacity="0.25"/>
  <circle cx="50" cy="150" r="4" fill="white" opacity="0.25"/>
  <circle cx="100" cy="150" r="4" fill="white" opacity="0.25"/>
  <circle cx="150" cy="150" r="4" fill="white" opacity="0.25"/>
  <!-- highlighted dots forming a path -->
  <circle cx="100" cy="100" r="7" fill="white" opacity="0.9"/>
  <circle cx="70" cy="70" r="6" fill="#e879f9" opacity="0.9"/>
  <circle cx="130" cy="70" r="6" fill="#e879f9" opacity="0.9"/>
  <circle cx="70" cy="130" r="6" fill="#e879f9" opacity="0.9"/>
  <circle cx="130" cy="130" r="6" fill="#e879f9" opacity="0.9"/>
  <!-- connecting lines -->
  <line x1="70" y1="70" x2="100" y2="100" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="70" x2="100" y2="100" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="70" y1="130" x2="100" y2="100" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="130" x2="100" y2="100" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- wordmark -->
  <text x="100" y="182" text-anchor="middle" fill="white" font-size="15" font-family="Arial,sans-serif" font-weight="700" letter-spacing="0.5">categorAIs</text>
</svg>
